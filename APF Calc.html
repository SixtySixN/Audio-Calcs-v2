const runBtn = elById('run');
if(runBtn) runBtn.onclick = ()=> {
  outEl.textContent = 'Working...';
  debugEl.textContent = '';
  try {
    const fc = +document.getElementById('fc').value;
    const fmin = +document.getElementById('fmin').value;
    const fmax = +document.getElementById('fmax').value;
    const bandOct = +document.getElementById('band').value;
    const applyTo = document.getElementById('applyTo').value;
    const Qmin = parseFloat(document.getElementById('qmin').value) || 0.3;
    const Qmax = parseFloat(document.getElementById('qmax').value) || 3.0;

    if(!mainParsed || !subParsed){ outEl.textContent = 'Upload both main and sub files.'; return; }

    const mainDet = detectFreqPhase(mainParsed.cols, mainParsed.headerTokens);
    const subDet  = detectFreqPhase(subParsed.cols, subParsed.headerTokens);
    const mainFreqIdx = mainDet.freqIdx, mainPhaseIdx = mainDet.phaseIdx;
    const subFreqIdx  = subDet.freqIdx,  subPhaseIdx  = subDet.phaseIdx;
    const mainCohIdx = mainDet.coherenceIdx;
    const subCohIdx  = subDet.coherenceIdx;
    const mainMagIdx = mainDet.magnitudeIdx;
    const subMagIdx  = subDet.magnitudeIdx;
    const useCohWeighting = !!(elById('useCohWeighting') && elById('useCohWeighting').checked);

    // build fit frequency vector
    const f_lo = fc*Math.pow(2, -bandOct/2);
    const f_hi = fc*Math.pow(2, bandOct/2);
    const Nfreq = 120;
    const freqs = new Array(Nfreq);
    for(let i=0;i<Nfreq;i++) freqs[i] = f_lo*Math.pow(f_hi/f_lo, i/(Nfreq-1));

    // interpolate unwrapped phase to freqs (internal)
    const mainInterp = interpPhaseUnwrapped(mainParsed.cols, mainFreqIdx, mainPhaseIdx, freqs);
    const subInterp  = interpPhaseUnwrapped(subParsed.cols,  subFreqIdx,  subPhaseIdx,  freqs);
    if(!mainInterp || !subInterp){ outEl.textContent = 'Interpolation failed: check files.'; return; }

    const mainFitInterp = interpPhaseUnwrappedGapAware(mainParsed.cols, mainFreqIdx, mainPhaseIdx, freqs, mainCohIdx);
    const subFitInterp  = interpPhaseUnwrappedGapAware(subParsed.cols,  subFreqIdx,  subPhaseIdx,  freqs, subCohIdx);
    if(!mainFitInterp || !subFitInterp){ outEl.textContent = 'Gap-aware interpolation failed: check files.'; return; }
    const mainMagInterp = interpNumericColumn(mainParsed.cols, mainFreqIdx, mainMagIdx, freqs);
    const subMagInterp = interpNumericColumn(subParsed.cols, subFreqIdx, subMagIdx, freqs);
    const magnitudeWeights = buildMagnitudeWeights(mainMagInterp, subMagInterp);

    const applyMain = (applyTo === 'main');
    const applySub  = (applyTo === 'sub');
    if(applyTo === 'both'){
      outEl.textContent =
        'For relative main/sub alignment, a single 2nd-order APF must be applied to one side only. ' +
        'Applying the same APF to both channels does not change their phase difference. ' +
        'Set "Apply APF to" = Main only or Sub only.';
      return;
    }

    // Gap-aware base relative phase (main - sub) for fitting only.
    const deltaBaseFitRaw = mainFitInterp.phase.map((m,i)=> {
      const s = subFitInterp.phase[i];
      if(m===null || s===null || !isFinite(m) || !isFinite(s)) return null;
      return m - s;
    });
    const deltaBaseFit = unwrapRadArrayWithGaps(deltaBaseFitRaw);
    const fitWeights = new Array(freqs.length).fill(0);
    for(let i=0;i<freqs.length;i++){
      if(deltaBaseFit[i] === null || !isFinite(deltaBaseFit[i])) continue;
      const qmRaw = mainFitInterp.quality[i];
      const qsRaw = subFitInterp.quality[i];
      const wm = (qmRaw===null || !isFinite(qmRaw)) ? 1 : Math.max(0, Math.min(1, qmRaw));
      const ws = (qsRaw===null || !isFinite(qsRaw)) ? 1 : Math.max(0, Math.min(1, qsRaw));
      const cohW = useCohWeighting ? (wm * ws) : 1;
      const magW = (isFinite(magnitudeWeights[i]) && magnitudeWeights[i] > 0) ? magnitudeWeights[i] : 0;
      const w = cohW * magW;
      fitWeights[i] = (isFinite(w) && w > 1e-6) ? w : 0;
    }

    // APF fit (search f0 and Q)
    const apfModelKey = elById('apfModel')?.value || 'parametric';
    const apfModel = APF_MODELS[apfModelKey];
    const useMeasured = apfModel && apfModel.type === 'measured';
    const nF0 = 160;
    let best = null;
    const omegaArr = freqs.map(f=>2*Math.PI*f);
    const apSign = applyMain ? 1 : -1; // contribution sign in (main - sub)
    
    for(let k=0;k<nF0;k++){
      const t = k/(nF0-1);
      const f0 = fmin*Math.pow(fmax/fmin, t);
      const omega0 = 2*Math.PI*f0;
      function objective(Q){
        if(!(Q>0 && isFinite(Q))) return {score:1e12};
        const phiAp = new Array(omegaArr.length);
        for(let i=0;i<omegaArr.length;i++){
          if(useMeasured){
            phiAp[i] = apPhaseMeasured(freqs[i], f0, Q, apfModelKey);
          } else {
            phiAp[i] = apPhaseRad(omegaArr[i], omega0, Q);
          }
        }
        const phiApUnwrapped = unwrapRadArray(phiAp);
        const y = [];
        const omegaUsed = [];
        const weightsUsed = [];
        for(let i=0;i<omegaArr.length;i++){
          const base = deltaBaseFit[i];
          const wi = fitWeights[i];
          if(base===null || !isFinite(base) || !(wi > 0)) continue;
          y.push(base + apSign*phiApUnwrapped[i]);
          omegaUsed.push(omegaArr[i]);
          weightsUsed.push(wi);
        }
        if(y.length < 3) return {score:1e12};
        const fit = solveTauBiasWeighted(y, omegaUsed, weightsUsed);
        // Don't reject based on first arrival feasibility yet - path offset will handle this
        return {
          score: fit.phaseRMS,
          tau: fit.tau,
          bias: fit.bias,
          phaseRMS: fit.phaseRMS,
          nUsed: fit.nUsed,
          weightSum: fit.weightSum
        };
      }
      let a = Qmin, b = Qmax;
      for(let iter=0; iter<40; iter++){
        const m1 = a + (b-a)/3;
        const m2 = b - (b-a)/3;
        const f1 = objective(m1).score, f2 = objective(m2).score;
        if(f1 > f2) a = m1; else b = m2;
      }
      const Qbest = (a+b)/2;
      const fitRes = objective(Qbest);
      if(!best || fitRes.score < best.score){
        best = {
          f0,
          Q: Qbest,
          score: fitRes.score,
          tau: fitRes.tau,
          bias: fitRes.bias,
          phaseRMS: fitRes.phaseRMS,
          nUsed: fitRes.nUsed,
          weightSum: fitRes.weightSum
        };
      }
    }

    if(!best){ outEl.textContent = 'No valid solution found. Try widening ranges.'; return; }

    // compute APF curves for plotting on a dense plotting grid
    const omega0 = 2*Math.PI*best.f0;
    const pts = 900;
    const plotScale = getPlotScaleRange();
    const plotFmin = plotScale.minHz;
    const plotFmax = plotScale.maxHz;
    const freqsPlot = new Array(pts);
    const apPlotDeg = new Array(pts);
    const apPlotRad = new Array(pts);
    for(let i=0;i<pts;i++){
      const ff = plotFmin*Math.pow(plotFmax/plotFmin, i/(pts-1));
      freqsPlot[i] = ff;
      let pap;
      if(useMeasured){
        pap = apPhaseMeasured(ff, best.f0, best.Q, apfModelKey);
      } else {
        pap = apPhaseRad(2*Math.PI*ff, omega0, best.Q);
      }
      apPlotRad[i] = pap;
      apPlotDeg[i] = rad2deg(pap);
    }

    // convert internal interpolated arrays (mainInterp/subInterp) to degrees on fit freqs
    const mainOrigDeg = mainInterp.map(rad2deg);
    const subOrigDeg  = subInterp.map(rad2deg);

    function interpDegArray(sourceFreqs, sourceDegs, targetFreqs){
      const out = new Array(targetFreqs.length);
      for(let j=0;j<targetFreqs.length;j++){
        const ff = targetFreqs[j];
        if(ff <= sourceFreqs[0]) { out[j] = sourceDegs[0]; continue; }
        if(ff >= sourceFreqs[sourceFreqs.length-1]) { out[j] = sourceDegs[sourceDegs.length-1]; continue; }
        let lo = 0, hi = sourceFreqs.length-1;
        while(hi-lo>1){
          const m = Math.floor((lo+hi)/2);
          if(sourceFreqs[m] <= ff) lo = m; else hi = m;
        }
        const t = (ff - sourceFreqs[lo]) / (sourceFreqs[hi] - sourceFreqs[lo]);
        out[j] = sourceDegs[lo] + t*(sourceDegs[hi] - sourceDegs[lo]);
      }
      return out;
    }

    const mainPlotRadFull = interpPhaseUnwrapped(mainParsed.cols, mainFreqIdx, mainPhaseIdx, freqsPlot, false);
    const subPlotRadFull  = interpPhaseUnwrapped(subParsed.cols,  subFreqIdx,  subPhaseIdx,  freqsPlot, false);
    const mainPlotDeg = mainPlotRadFull.map(v => isFinite(v) ? rad2deg(v) : null);
    const subPlotDeg  = subPlotRadFull.map(v => isFinite(v) ? rad2deg(v) : null);
    const mainMagPlot = interpNumericColumnGapAware(mainParsed.cols, mainFreqIdx, mainMagIdx, freqsPlot);
    const subMagPlot = interpNumericColumnPreserveNullGaps(subParsed.cols, subFreqIdx, subMagIdx, freqsPlot);
    const subCohPlot = interpNumericColumnPreserveNullGaps(subParsed.cols, subFreqIdx, subCohIdx, freqsPlot);
    const subCoherenceMask = buildCoherenceKeepMaskAbovePassband(freqsPlot, subMagPlot, subCohPlot, getCoherenceThreshold(), true);
    const subKeepMask = applySubFrequencyCutoffMask(freqsPlot, subCoherenceMask, getSubMaxHz(false));
    const subMagPlotMasked = applyKeepMask(subMagPlot, subKeepMask);

    // compute post-APF traces with fixed physical sign
    const mainPostRaw = new Array(pts), subPostRaw = new Array(pts);
    for(let i=0;i<pts;i++){
      mainPostRaw[i] = applyMain ? mainPlotDeg[i] + apPlotDeg[i] : mainPlotDeg[i];
      subPostRaw[i]  = applySub  ? subPlotDeg[i]  + apPlotDeg[i] : subPlotDeg[i];
    }

    // find index nearest fc in freqs (for display)
    let idxFc = 0;
    for(let i=0;i<freqs.length;i++) if(Math.abs(freqs[i]-fc) < Math.abs(freqs[idxFc]-fc)) idxFc = i;

    // exact interpolation at fc
    const mainAtFcRad = interpLinear(freqs, mainInterp, fc);
    const subAtFcRad  = interpLinear(freqs, subInterp, fc);
    const mainWrapped = wrapDeg180(rad2deg(mainAtFcRad));
    const subWrapped  = wrapDeg180(rad2deg(subAtFcRad));
    const phaseDiffWrapped = wrapDeg180(mainWrapped - subWrapped);

    // compute exact-frequency AP phase at fc (radians)
    let apAtFcRad;
    if(useMeasured){
      apAtFcRad = apPhaseMeasured(fc, best.f0, best.Q, apfModelKey);
    } else {
      apAtFcRad = apPhaseRad(2*Math.PI*fc, omega0, best.Q);
    }

    const mainPostDegExact = rad2deg(mainAtFcRad + (applyMain ? apAtFcRad : 0));
    const subPostDegExact  = rad2deg(subAtFcRad  + (applySub  ? apAtFcRad : 0));
    const residualExact = wrapDeg180(mainPostDegExact - subPostDegExact);

    // Build final post arrays
    const mainPostDeg = new Array(pts);
    const subPostDeg  = new Array(pts);
    for(let i=0;i<pts;i++){
      mainPostDeg[i] = mainPostRaw[i];
      subPostDeg[i] = subPostRaw[i];
    }

    // Delay recommendation - now accounting for BOTH phase and path offset
    // The phase difference at fc BEFORE any delay (but AFTER APF):
    const residualBeforeDelay = residualExact;
    
    // Get path offset information
    const pathInfo = calculatePathOffset();
    const pathOffset = pathInfo.signedOffsetSec;
    const period = 1 / fc;
    
    // The phase measurements already include the propagation delay effects
    // We need to find the electronic delay that minimizes phase residual
    // The path offset helps us pick the right cycle (avoids ±N period ambiguity)
    
    const tauPhaseIdeal = tauFromPhaseDiffAtFc(residualBeforeDelay, fc);  // Ideal phase correction
    
    // Find which cycle of tauPhaseIdeal is closest to pathOffset
    // This is the delay that both time-aligns AND phase-aligns
    let tau = pathOffset;  // Default to just time alignment
    let tauNoApf = pathOffset;
    let minDistWithApf = Infinity;
    let minDistNoApf = Infinity;
    
    const firstArrivalTarget = getFirstArrivalTarget();
    for (let n = -5; n <= 5; n++) {
      const testTau = tauPhaseIdeal + n * period;
      
      // Check if delay is feasible (non-negative for first-arriving source)
      if (firstArrivalTarget === 'sub' && testTau < 0) continue;
      if (firstArrivalTarget === 'main' && testTau > 0) continue;
      
      // Pick the cycle closest to pathOffset
      const dist = Math.abs(testTau - pathOffset);
      if (dist < minDistWithApf) {
        minDistWithApf = dist;
        tau = testTau;
      }
    }
    
    // Same for bypass case (no APF)
    const tauNoApfPhaseOnly = tauFromPhaseDiffAtFc(phaseDiffWrapped, fc);
    for (let n = -5; n <= 5; n++) {
      const testTau = tauNoApfPhaseOnly + n * period;
      
      if (firstArrivalTarget === 'sub' && testTau < 0) continue;
      if (firstArrivalTarget === 'main' && testTau > 0) continue;
      
      const dist = Math.abs(testTau - pathOffset);
      if (dist < minDistNoApf) {
        minDistNoApf = dist;
        tauNoApf = testTau;
      }
    }
    
    const biasDeg = 0;
    const recWithApf = getRecommendedDelayFromTauSub(tau);
    const recNoApf = getRecommendedDelayFromTauSub(tauNoApf);
    const firstWithApf = getDelayForFirstArrival(tau);
    const firstNoApf = getDelayForFirstArrival(tauNoApf);
    const userWithApf = getDelayForCurrentTarget(tau);
    const userNoApf = getDelayForCurrentTarget(tauNoApf);

    // phase correction at fc (degrees) produced by delaying sub by tau: delta_deg = -omega_fc * tau * 180/pi
    const omegaFc = 2*Math.PI*fc;
    const phaseCorrectionDeg = -omegaFc * tau * 180/Math.PI;

    // show badges and results
    document.getElementById('badges').style.display = 'flex';
    document.getElementById('apfEditRow').style.display = 'flex';
    document.getElementById('f0val').textContent = fmt2(best.f0);
    document.getElementById('qval').textContent = fmt2(best.Q);
    document.getElementById('copyBtn').onclick = ()=>{ const txt = fmt2(best.f0) + ',' + fmt2(best.Q); navigator.clipboard && navigator.clipboard.writeText(txt); };
    document.getElementById('editF0').value = fmt2(best.f0);
    document.getElementById('editQ').value = fmt2(best.Q);

    // Predict final residual at fc with APF + delay using selected target.
    const target = userWithApf.target;
    const tauApplied = userWithApf.delaySec;
    const residualFinal = computeResidualAtFcWithDelay(mainPostDegExact, subPostDegExact, fc, tauApplied, target);
    const selectedTargetNote = userWithApf.feasible ? '' :
      '<br>Note: selected target cannot realize the computed offset with non-negative delay; using 0.00 ms on ' + (target === 'sub' ? 'Sub' : 'Main') + '.';

    // Get distance and path offset information
    const apfModelName = APF_MODELS[apfModelKey]?.name || 'Unknown';

    outEl.innerHTML =
      '<strong>APF Model: ' + apfModelName + '</strong><br>' +
      'Recommended APF f₀ = ' + fmt2(best.f0) + ' Hz<br>' +
      'Recommended APF Q  = ' + fmt2(best.Q) + '<br><br>' +
      '<strong>Distance & Path Offset:</strong><br>' +
      '  Distance to Main = ' + fmt2(pathInfo.distMain) + ' m (' + fmt2(pathInfo.mainArrivalSec * 1000) + ' ms arrival)<br>' +
      '  Distance to Sub  = ' + fmt2(pathInfo.distSub) + ' m (' + fmt2(pathInfo.subArrivalSec * 1000) + ' ms arrival)<br>' +
      '  Path difference  = ' + fmt2(pathInfo.pathDiff) + ' m (' + fmt2(pathInfo.offsetMs) + ' ms)<br>' +
      '  <em>First arrival: ' + (pathInfo.arrivedFirst === 'main' ? 'Main' : 'Sub') + '</em><br>' +
      '  <br><br>' +
      '<strong>Phase Analysis @ fc = ' + fmt2(fc) + ' Hz:</strong><br>' +
      '  Main phase @ fc    = <span class="inline-primary">' + fmt2(wrapDeg180(mainWrapped)) + '°</span><br>' +
      '  Sub phase @ fc     = <span class="inline-primary">' + fmt2(wrapDeg180(subWrapped)) + '°</span><br>' +
      '  Phase diff (Main − Sub) before APF = <span class="inline-primary">' + fmt2(phaseDiffWrapped) + '°</span><br>' +
      '  Residual after APF = ' + fmt2(residualBeforeDelay) + '°<br><br>' +
      '<strong>Delay Recommendations:</strong><br>' +
      'Electronic delay (with APF) = <span class="inline-primary">' + fmt2(secToMs(firstWithApf.delaySec)) + ' ms on ' + (firstWithApf.target === 'sub' ? 'Sub' : 'Main') + '</span><br>' +
      'Electronic delay (APF bypassed) = ' + fmt2(secToMs(firstNoApf.delaySec)) + ' ms on ' + (firstNoApf.target === 'sub' ? 'Sub' : 'Main') + '<br>' +
      'Best-side recommendation (with APF) = ' + fmt2(secToMs(recWithApf.delaySec)) + ' ms on ' + (recWithApf.target === 'sub' ? 'Sub' : 'Main') + '<br>' +
      'Phase correction from delay at fc = ' + fmt2(phaseCorrectionDeg) + '°<br><br>' +
      'Final residual at fc (APF + delay) = ' + fmt2(residualFinal) + '°' + selectedTargetNote;

    debugEl.textContent =
      'Debug: APF Model = ' + apfModelName + '\n' +
      'AP target = ' + (applyMain ? 'Main' : 'Sub') + '\n' +
      'Weighting = ' + (useCohWeighting ? 'Coherence x Magnitude' : 'Magnitude only') + '\n' +
      'Path offset = ' + fmt2(pathInfo.offsetMs) + ' ms (' + fmt2(pathInfo.pathDiff) + ' m at ' + fmt2(pathInfo.distMain > 0 || pathInfo.distSub > 0 ? parseFloat(elById('speedSound')?.value || 343) : 343) + ' m/s)\n' +
      'Exact fc AP phase = ' + fmt2(rad2deg(apAtFcRad)) + '°\n' +
      'Fit phase RMS (weighted) = ' + fmt2(rad2deg(best.phaseRMS)) + '°\n' +
      'Fit points used = ' + String(best.nUsed || 0) + ' | total fit weight = ' + fmt2(best.weightSum || 0) + '\n' +
      'Fitted constant phase bias (not used for recommendation) = ' + fmt2(biasDeg) + '°\n' +
      'Tau@fc with APF = ' + fmt2(secToMs(tau)) + ' ms ; Tau@fc bypass APF = ' + fmt2(secToMs(tauNoApf)) + ' ms\n' +
      'Phase correction at fc from applied delay = ' + fmt2(phaseCorrectionDeg) + '°\n' +
      'If residual remains large, source traces may not be representable by one 2nd-order APF + pure delay in this band.';

    // store lastPlotData for toggles and preview updates
    lastPlotData = {
      freqsPlot,
      apPlotDeg,
      mainPlotDeg,
      subPlotDeg,
      mainMagPlot,
      subMagPlot,
      subCohPlot,
      subMagPlotMasked,
      subPhaseMask: subKeepMask,
      mainPostDeg,
      subPostDeg,
      footerText: 'At fc = ' + fmt2(fc) + ' Hz: Main = ' + fmt2(mainWrapped) + '°  Sub = ' + fmt2(subWrapped) + '°  Δ_exact = ' + fmt2(residualExact) + '°',
      mainBaseDeg: mainPlotDeg.slice(),
      subBaseDeg: subPlotDeg.slice(),
      mainPostBaseDeg: mainPostDeg.slice(),
      subPostBaseDeg: subPostDeg.slice(),
      plotFmin,
      plotFmax,
      exact: {
        fc: fc,
        fcIndex: idxFc,
        mainAtFcRad: mainAtFcRad,
        subAtFcRad: subAtFcRad,
        apAtFcRad: apAtFcRad,
        applyMain: applyMain,
        applySub: applySub,
        freqsFit: freqs,
        mainInterpRad: mainInterp,
        subInterpRad: subInterp,
        tau: tau,
        tauNoApf: tauNoApf,
        phaseCorrectionDeg: phaseCorrectionDeg,
        biasRad: 0
      }
    };

    if(elById('plotUseApf')) elById('plotUseApf').checked = true;
    if(elById('plotUseDelay')) elById('plotUseDelay').checked = true;
    syncBypassWithPlotToggles();
    document.getElementById('delayMs').value = fmt2(secToMs(userWithApf.delaySec));
    document.getElementById('tauRecInfo').textContent = formatFirstArrivalDelayText(tau, tauNoApf);
    document.getElementById('undoDelayBtn').disabled = false;

    // build toggles dynamically and legend based on which traces exist
    const traces = [
      {id:'showAP', label:'AP phase', color:'#b3b3b3', present:true},
      {id:'showMain', label:'Main original', color:'#58eb34', present:true},
      {id:'showSub', label:'Sub original', color:'#eb8334', present:true},
      {id:'showMainPost', label:'Main post‑APF', color:'#2a82c9', present: applyMain},
      {id:'showSubPost', label:'Sub post‑APF', color:'#eb34d8', present: applySub},
      {id:'showCombined', label:'Estimated sum trace', color:'#34d5eb', present: true}
    ];
    buildTraceToggles(traces, {
      showAP: true,
      showMain: true,
      showSub: true,
      showMainPost: true,
      showSubPost: true,
      showCombined: true
    });

    // initial draw using current toggles (all present toggles default to checked)
    updateDelayPreview();

  } catch(err) {
    console.error(err);
    outEl.textContent = 'Error during plotting: ' + (err && err.message ? err.message : String(err)) + '\nSee console for details.';
  }
};

/* Residual mode change redraw */
bindIf(elById('resMode'), 'change', ()=>{
  updateDelayPreview();
});

bindIf(elById('phaseMode'), 'change', ()=>{
  updateDelayPreview();
});

bindIf(elById('plotUseApf'), 'change', ()=>{

const plotCanvasEl = document.getElementById('plot');

function updateReadoutFromPhaseMouse(mx, my){
  if(!lastPhaseRender || !lastPlotData) return;
  const r = lastPhaseRender;
  if(mx < r.leftPad || mx > r.rightPad || my < r.topPad || my > r.bottomPad) return;
  const fq = freqFromCanvasX(mx, r.leftPad, r.rightPad, r.fmin, r.fmax);
  const idx = nearestIndexByFreq(r.freqs, fq);
  if(idx < 0) return;

  const yFromPhase = (deg)=> r.topPad + (1 - (deg - r.pmin)/(r.pmax-r.pmin))*(r.bottomPad-r.topPad);
  let best = null;
  let bestDy = Infinity;
  for(let i=0;i<r.series.length;i++){
    const s = r.series[i];
    if(!s.show || !s.values) continue;
    const pv = s.values[idx];
    if(!isFinite(pv)) continue;
    const dy = Math.abs(yFromPhase(pv) - my);
    if(dy < bestDy){
      bestDy = dy;
      best = s;
    }
  }
  if(!best || bestDy > 16) return;
  const phaseVal = best.values[idx];
  const magKey = (best.key === 'main' || best.key === 'mainPost') ? 'main' :
    ((best.key === 'sub' || best.key === 'subPost') ? 'sub' :
    (best.key === 'sum' ? 'sum' : null));
  const magVal = magKey ? getMagnitudeAtTraceKey(magKey, idx) : null;
  setPlotReadout(formatReadout(best.label, r.freqs[idx], phaseVal, magVal));
}

function updateReadoutFromMagMouse(mx, my){
  if(!lastMagRender || !lastPlotData) return;
  const r = lastMagRender;
  if(mx < r.leftPad || mx > r.rightPad || my < r.topPad || my > r.bottomPad) return;
  const fq = freqFromCanvasX(mx, r.leftPad, r.rightPad, r.fmin, r.fmax);
  const idx = nearestIndexByFreq(r.freqs, fq);
  if(idx < 0 || !isFinite(r.ymin) || !isFinite(r.ymax)) return;

  const yFromMag = (db)=> r.topPad + (1 - (db - r.ymin)/(r.ymax-r.ymin))*(r.bottomPad-r.topPad);
  let best = null;
  let bestDy = Infinity;
  for(let i=0;i<r.series.length;i++){
    const s = r.series[i];
    if(!s.show || !s.data) continue;
    const mv = s.data[idx];
    if(!isFinite(mv)) continue;
    const dy = Math.abs(yFromMag(mv) - my);
    if(dy < bestDy){
      bestDy = dy;
      best = s;
    }
  }
  if(!best || bestDy > 16) return;
  const magVal = best.data[idx];
  const phaseKey = best.key === 'sum' ? 'sum' : best.key;
  const phaseVal = getPhaseAtTraceKey(phaseKey, idx);
  setPlotReadout(formatReadout(best.label, r.freqs[idx], phaseVal, magVal));
}

plotCanvasEl.addEventListener('mousemove', (ev)=>{
  if(!lastPlotData) return;
  const rect = plotCanvasEl.getBoundingClientRect();
  const mx = ev.clientX - rect.left;
  const my = ev.clientY - rect.top;
  updateReadoutFromPhaseMouse(mx, my);
  let hit = -1;
  let bestD2 = 64;
  for(let i=0;i<lastMarkerHits.length;i++){
    const mk = lastMarkerHits[i];
    const dx = mx - mk.x;
    const dy = my - mk.y;
    const d2 = dx*dx + dy*dy;
    if(d2 <= bestD2){
      bestD2 = d2;
      hit = i;
    }
  }
  if(hit !== hoverMarkerIndex){
    hoverMarkerIndex = hit;
    const toggles = getToggleState();
    const fc = lastPlotData.exact ? lastPlotData.exact.fc : parseFloat(document.getElementById('fc').value);
    const resMode = document.getElementById('resMode') ? document.getElementById('resMode').value : 'exact';
    drawPlotFromData(lastPlotData, toggles, fc, resMode);
  }
});

plotCanvasEl.addEventListener('mouseleave', ()=>{
  if(hoverMarkerIndex !== -1){
    hoverMarkerIndex = -1;
    if(!lastPlotData) return;
    const toggles = getToggleState();
    const fc = lastPlotData.exact ? lastPlotData.exact.fc : parseFloat(document.getElementById('fc').value);
    const resMode = document.getElementById('resMode') ? document.getElementById('resMode').value : 'exact';
    drawPlotFromData(lastPlotData, toggles, fc, resMode);
  }
  setPlotReadout('Move over a trace to see frequency, phase, and magnitude.');
});

magCanvasEl.addEventListener('mousemove', (ev)=>{
  if(!lastPlotData) return;
  const rect = magCanvasEl.getBoundingClientRect();
  const mx = ev.clientX - rect.left;
  const my = ev.clientY - rect.top;
  updateReadoutFromMagMouse(mx, my);
});

magCanvasEl.addEventListener('mouseleave', ()=>{
  setPlotReadout('Move over a trace to see frequency, phase, and magnitude.');
});
